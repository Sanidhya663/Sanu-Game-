<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe Pro</title>

  <style>
    body {
      background: #f4f4f9;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .game-container {
      text-align: center;
    }

    h1 {
      color: #333;
    }

    .controls {
      margin-bottom: 15px;
    }

    .controls h3 {
      margin: 5px 0;
    }

    .controls button {
      margin: 5px;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #333;
      color: white;
    }

    .controls button:hover {
      background: #555;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      margin: 20px auto;
      border: 5px solid #444;
      border-radius: 15px;
      padding: 5px;
      background-color: #fff;
    }

    .cell {
      background-color: #e0e0e0;
      border-radius: 10px;
      font-size: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .cell:hover {
      background-color: #d5d5d5;
    }

    .cell.taken {
      cursor: not-allowed;
    }

    .status {
      font-size: 1.2rem;
      margin-top: 10px;
    }

    .restart {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .restart:hover {
      background-color: #555;
    }
  </style>
</head>

<body>

<div class="game-container">
  <h1>🎮 Tic Tac Toe</h1>

  <div class="controls">
    <h3>Game Mode</h3>
    <button onclick="setMode('friend')">👥 Friend</button>
    <button onclick="setMode('ai')">🤖 AI</button>

    <h3>Difficulty</h3>
    <button onclick="setDifficulty('easy')">Easy</button>
    <button onclick="setDifficulty('hard')">Hard</button>
    <button onclick="setDifficulty('impossible')">Impossible</button>
  </div>

  <div class="board" id="board"></div>
  <div class="status" id="status">Player X's turn</div>
  <button class="restart" onclick="resetGame()">Restart</button>
</div>

<script>
  const board = document.getElementById("board");
  const statusText = document.getElementById("status");

  let currentPlayer = "X";
  let gameOver = false;
  let moves = Array(9).fill("");

  let mode = "friend";
  let difficulty = "easy";

  function createBoard() {
    board.innerHTML = "";
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.index = i;
      cell.addEventListener("click", handleMove);
      board.appendChild(cell);
    }
  }

  function handleMove(e) {
    const index = e.target.dataset.index;

    if (moves[index] !== "" || gameOver) return;

    makeMove(index, currentPlayer);

    if (gameOver) return;

    if (mode === "ai" && currentPlayer === "O") {
      setTimeout(aiMove, 300);
    }
  }

  function makeMove(index, player) {
    moves[index] = player;

    const cell = document.querySelector(`[data-index='${index}']`);
    cell.textContent = player;
    cell.classList.add("taken");

    if (checkWin(player)) {
      statusText.textContent = `🎉 Player ${player} wins!`;
      gameOver = true;
      return;
    }

    if (moves.every(c => c !== "")) {
      statusText.textContent = "It's a draw!";
      gameOver = true;
      return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    statusText.textContent = `Player ${currentPlayer}'s turn`;
  }

  function aiMove() {
    let index;

    if (difficulty === "easy") {
      index = randomMove();
    } else if (difficulty === "hard") {
      index = bestMoveSimple();
    } else {
      index = minimax(moves, "O").index;
    }

    makeMove(index, "O");
  }

  function randomMove() {
    const empty = moves.map((v, i) => v === "" ? i : null).filter(v => v !== null);
    return empty[Math.floor(Math.random() * empty.length)];
  }

  function bestMoveSimple() {
    // Win
    for (let i = 0; i < 9; i++) {
      if (moves[i] === "") {
        moves[i] = "O";
        if (checkWin("O")) {
          moves[i] = "";
          return i;
        }
        moves[i] = "";
      }
    }

    // Block
    for (let i = 0; i < 9; i++) {
      if (moves[i] === "") {
        moves[i] = "X";
        if (checkWin("X")) {
          moves[i] = "";
          return i;
        }
        moves[i] = "";
      }
    }

    return randomMove();
  }

  function minimax(newMoves, player) {
    const empty = newMoves.map((v, i) => v === "" ? i : null).filter(v => v !== null);

    if (checkWin("X")) return { score: -10 };
    if (checkWin("O")) return { score: 10 };
    if (empty.length === 0) return { score: 0 };

    let movesList = [];

    for (let i of empty) {
      let move = {};
      move.index = i;
      newMoves[i] = player;

      let result = minimax(newMoves, player === "O" ? "X" : "O");
      move.score = result.score;

      newMoves[i] = "";
      movesList.push(move);
    }

    return player === "O"
      ? movesList.reduce((best, m) => m.score > best.score ? m : best)
      : movesList.reduce((best, m) => m.score < best.score ? m : best);
  }

  function checkWin(player) {
    const patterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    return patterns.some(([a,b,c]) =>
      moves[a] === player &&
      moves[b] === player &&
      moves[c] === player
    );
  }

  function resetGame() {
    moves = Array(9).fill("");
    currentPlayer = "X";
    gameOver = false;
    statusText.textContent = "Player X's turn";
    createBoard();
  }

  function setMode(m) {
    mode = m;
    resetGame();
  }

  function setDifficulty(d) {
    difficulty = d;
    resetGame();
  }

  createBoard();
</script>

</body>
</html>
